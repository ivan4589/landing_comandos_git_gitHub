<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"> </script>
    <title>Document</title>
</head>
<body class="bg-slate-900 text-slate-200 p-4">
    <main class="max-w-3xl mx-aito">
       <div class="bg-slate-800/400 border border-slate-700 rounded-xl p-4 mb-6">
            <div class="bg-indigo-600 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm mb-3">01</div>
            <h3 class="font-bold text-white uppercase text-xs">Inicializar proyecto</h3>
            <div class="bg-black p-4 rounded font-mono text-emerald-400 text-sm border-l-4 border-indigo-500 mt-3">
                mkdir proyecto-Git <br>
                cd proyecto-Git <br>
                git init
            </div>
       </div>
       <div class="bg-slate-800/400 border border-slate-700 rounded-xl p-4 mb-6">
            <div class="bg-indigo-600 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm mb-3">02</div>
            <h3 class="font-bold text-white uppercase text-xs">Primer commit local</h3>
            <div class="bg-black p-4 rounded font-mono text-emerald-400 text-sm border-l-4 border-indigo-500 mt-3">
                git add . <br>
                git commit-m "Descripcion de lo que hicimos" <br>
                git init
            </div>
       </div>
            
</body>
</html>
